name: Build & Release

# Build a self-contained x64 build and attach it to a GitHub Release.
# - Push a tag like v1.0.0  -> builds and publishes a Release with the zip.
# - Run manually (workflow_dispatch) -> builds and uploads the zip as a
#   downloadable workflow artifact (no Release created).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # required to create the Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # WinUI 3 needs Visual Studio's MSBuild (it carries the Appx/PRI
      # packaging tasks that the bare `dotnet` CLI lacks).
      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: msbuild AirPodsBattery.csproj -t:Restore -p:Configuration=Release -p:Platform=x64

      - name: Publish (self-contained x64)
        run: >
          msbuild AirPodsBattery.csproj -t:Publish
          -p:Configuration=Release
          -p:Platform=x64
          -p:RuntimeIdentifier=win-x64
          -p:SelfContained=true
          -p:PublishDir=artifact\

      - name: Package zip
        id: package
        shell: pwsh
        run: |
          $name = "AirPodsBattery-$($env:GITHUB_REF_NAME)-win-x64.zip"
          Compress-Archive -Path artifact\* -DestinationPath $name -Force
          "zip=$name" >> $env:GITHUB_OUTPUT
          Write-Host "Packaged $name ($([math]::Round((Get-Item $name).Length/1MB,1)) MB)"

      # Manual runs: keep the build as a downloadable artifact.
      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: AirPodsBattery-win-x64
          path: ${{ steps.package.outputs.zip }}

      # Tag pushes: publish a GitHub Release with the zip attached.
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip }}
          generate_release_notes: true
